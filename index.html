<style>
/* ==================== RESET & BASE ==================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --c-bg: #0a0a0a;
  --c-bg2: #111111;
  --c-bg3: #1a1a1a;
  --c-border: rgba(255,255,255,0.08);
  --c-border2: rgba(255,255,255,0.14);
  --c-text: #f0ede8;
  --c-text2: #9a9490;
  --c-text3: #5a5652;
  --c-accent: #d4ff5c;
  --c-accent2: #ff6b35;
  --c-danger: #ff4444;
  --c-success: #4ade80;
  --font-display: 'Syne', sans-serif;
  --font-body: 'Noto Sans JP', sans-serif;
  --font-num: 'Inter', sans-serif;
  --max-w: 720px;
  --radius: 12px;
  --radius-sm: 6px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--c-bg);
  color: var(--c-text);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.container {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
}

/* ==================== NAV ==================== */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 16px 0;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--c-border);
  transition: all 0.3s ease;
}

.nav-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--c-text);
}

.nav-logo span {
  color: var(--c-accent);
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--c-accent);
  color: #0a0a0a;
  border: none;
  padding: 9px 18px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s ease;
}

.nav-cta:hover {
  background: #c8f050;
  transform: translateY(-1px);
}

/* ==================== HERO ==================== */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 120px 24px 80px;
  position: relative;
  overflow: hidden;
  max-width: var(--max-w);
  margin: 0 auto;
}

.hero::before {
  content: '';
  position: absolute;
  top: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(212,255,92,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--c-accent);
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.1s forwards;
}

.hero-eyebrow::before {
  content: '';
  display: block;
  width: 20px; height: 1px;
  background: var(--c-accent);
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 6vw, 56px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.2s forwards;
}

.hero-title .accent { color: var(--c-accent); }
.hero-title .line2 { display: block; }

.hero-sub {
  font-size: 16px;
  line-height: 1.8;
  color: var(--c-text2);
  max-width: 520px;
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.3s forwards;
}

.hero-proof-row {
  display: flex;
  gap: 32px;
  margin-bottom: 40px;
  padding: 20px 0;
  border-top: 1px solid var(--c-border);
  border-bottom: 1px solid var(--c-border);
  opacity: 0;
  animation: fadeUp 0.6s ease 0.4s forwards;
}

.proof-item { flex: 1; }
.proof-num {
  font-family: var(--font-num);
  font-size: 28px;
  font-weight: 800;
  color: var(--c-text);
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 4px;
}
.proof-label {
  font-size: 11px;
  color: var(--c-text3);
  letter-spacing: 0.04em;
  line-height: 1.4;
}

.hero-ctas {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 12px;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.5s forwards;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--c-accent);
  color: #0a0a0a;
  border: none;
  padding: 15px 32px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s ease;
}

.btn-primary:hover {
  background: #c8f050;
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(212,255,92,0.25);
}

.btn-sub-text {
  font-size: 12px;
  color: var(--c-text3);
}

/* LINE icon SVG */
.line-icon {
  width: 18px; height: 18px;
  background: #0a0a0a;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ==================== SECTION BASE ==================== */
.sec {
  padding: 80px 0;
  border-top: 1px solid var(--c-border);
}

.sec-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--c-accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sec-label::before {
  content: '';
  display: block;
  width: 16px; height: 1px;
  background: var(--c-accent);
}

.sec-title {
  font-family: var(--font-display);
  font-size: clamp(24px, 4vw, 32px);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}

.sec-desc {
  font-size: 15px;
  color: var(--c-text2);
  line-height: 1.8;
  max-width: 560px;
}

/* ==================== COMPARE ==================== */
.cost-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 20px 0 28px;
}

.cost-tag {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 100px;
  background: rgba(255,68,68,0.12);
  color: #ff8080;
  border: 1px solid rgba(255,68,68,0.2);
  font-weight: 500;
}

.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  border-radius: var(--radius);
  overflow: hidden;
  margin-top: 24px;
}

.compare-header {
  padding: 14px 18px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.compare-header.old {
  background: rgba(255,68,68,0.1);
  color: #ff8080;
}

.compare-header.new {
  background: rgba(212,255,92,0.1);
  color: var(--c-accent);
}

.compare-row {
  display: contents;
}

.compare-cell {
  padding: 14px 18px;
  font-size: 13px;
  line-height: 1.5;
}

.compare-cell.old {
  background: var(--c-bg2);
  color: #ff8080;
}

.compare-cell.new {
  background: var(--c-bg3);
  color: var(--c-success);
  font-weight: 500;
}

.compare-row-label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  font-size: 11px;
  color: var(--c-text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ==================== VIDEO GALLERY ==================== */
.vid-format-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--c-accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.vid-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.vid-thumb {
  position: relative;
  aspect-ratio: 9/14;
  background: var(--c-bg2);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.vid-thumb:hover {
  border-color: var(--c-accent);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.vid-thumb.wide { aspect-ratio: 16/9; }

/* VIDEO: mp4蟾ｮ縺苓ｾｼ縺ｿ逕ｨ */
.vid-thumb video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.vid-thumb.has-video video { opacity: 1; }
.vid-thumb.has-video .vid-placeholder { display: none; }

.vid-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%; height: 100%;
}

.vid-play-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--c-border2);
  display: flex; align-items: center; justify-content: center;
  color: var(--c-text3);
  transition: all 0.2s ease;
}

.vid-thumb:hover .vid-play-icon {
  border-color: var(--c-accent);
  color: var(--c-accent);
}

.vid-type-badge {
  position: absolute;
  top: 8px; left: 8px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  letter-spacing: 0.04em;
  backdrop-filter: blur(4px);
}

.vid-caption {
  font-size: 11px;
  color: var(--c-text3);
  text-align: center;
  padding: 0 8px;
}


.vid-tool-note {
  margin-top: 16px;
  padding: 12px 16px;
  background: var(--c-bg2);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--c-text3);
}

/* ==================== STATS ==================== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin-top: 28px;
  border-radius: var(--radius);
  overflow: hidden;
}

.stat-card {
  background: var(--c-bg2);
  padding: 28px 20px;
  text-align: center;
}

.stat-num {
  font-family: var(--font-num);
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--c-text);
  line-height: 1;
  margin-bottom: 8px;
}

.stat-label {
  font-size: 12px;
  color: var(--c-text3);
  line-height: 1.5;
}

/* ==================== CLIENTS ==================== */
.client-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 28px;
}

.client-card {
  background: var(--c-bg2);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  padding: 18px;
  transition: border-color 0.2s ease;
}

.client-card:hover { border-color: var(--c-border2); }

.client-industry {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c-accent);
  margin-bottom: 6px;
}

.client-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--c-text);
  margin-bottom: 6px;
}

.client-work {
  font-size: 12px;
  color: var(--c-text3);
  line-height: 1.6;
}

.industry-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 24px;
}

.ind-tag {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid var(--c-border2);
  color: var(--c-text2);
}

/* ==================== PLATFORMS ==================== */
.platform-list {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 24px;
}

.platform-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border: 1px solid var(--c-border2);
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  color: var(--c-text);
  background: var(--c-bg2);
}

/* ==================== STEPS ==================== */
.steps { margin-top: 28px; }

.step {
  display: flex;
  gap: 20px;
  padding-bottom: 32px;
  position: relative;
}

.step:not(:last-child)::before {
  content: '';
  position: absolute;
  left: 15px; top: 32px; bottom: 0;
  width: 1px;
  background: var(--c-border);
}

.step-num {
  width: 32px; height: 32px;
  min-width: 32px;
  border-radius: 50%;
  border: 1px solid var(--c-border2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--c-accent);
  background: var(--c-bg);
  z-index: 1;
}

.step-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--c-text);
  margin-bottom: 6px;
  padding-top: 5px;
}

.step-desc {
  font-size: 13px;
  color: var(--c-text2);
  line-height: 1.7;
}

/* ==================== PLANS ==================== */
.plans {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 28px;
}

.plan-card {
  background: var(--c-bg2);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  padding: 22px 18px;
  display: flex;
  flex-direction: column;
  transition: border-color 0.2s ease;
}

.plan-card:hover { border-color: var(--c-border2); }

.plan-card.featured {
  border-color: var(--c-accent);
  background: rgba(212,255,92,0.04);
}

.plan-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 100px;
  background: var(--c-accent);
  color: #0a0a0a;
  margin-bottom: 12px;
  align-self: flex-start;
}

.plan-name {
  font-size: 12px;
  color: var(--c-text2);
  margin-bottom: 6px;
  font-weight: 500;
}

.plan-price {
  font-family: var(--font-num);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--c-text);
  margin-bottom: 2px;
}

.plan-sub {
  font-size: 12px;
  color: var(--c-text3);
  margin-bottom: 14px;
}

.plan-divider {
  height: 1px;
  background: var(--c-border);
  margin-bottom: 14px;
}

.plan-desc {
  font-size: 12px;
  color: var(--c-text2);
  line-height: 1.6;
  margin-bottom: 14px;
}

.plan-features {
  list-style: none;
  margin-bottom: 18px;
  flex: 1;
}

.plan-features li {
  font-size: 12px;
  color: var(--c-text2);
  padding: 4px 0;
  display: flex;
  gap: 8px;
  align-items: flex-start;
  line-height: 1.5;
}

.plan-features li::before {
  content: '笨・;
  color: var(--c-success);
  font-weight: 700;
  font-size: 11px;
  flex-shrink: 0;
  margin-top: 2px;
}

.plan-cta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 14px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s ease;
  border: 1px solid var(--c-border2);
  color: var(--c-text);
  background: transparent;
}

.plan-cta:hover { border-color: var(--c-accent); color: var(--c-accent); }

.plan-card.featured .plan-cta {
  background: var(--c-accent);
  color: #0a0a0a;
  border-color: transparent;
}

.plan-card.featured .plan-cta:hover {
  background: #c8f050;
}

.options-box {
  margin-top: 16px;
  padding: 16px 18px;
  background: var(--c-bg2);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
}

.options-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--c-text2);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.option-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--c-border);
  font-size: 13px;
}

.option-row:last-child { border-bottom: none; }
.option-name { color: var(--c-text2); }
.option-price { font-weight: 700; color: var(--c-text); font-family: var(--font-display); }

/* ==================== FAQ ==================== */
.faq-list { margin-top: 28px; }

.faq-item {
  border-bottom: 1px solid var(--c-border);
  padding: 20px 0;
}

.faq-q {
  font-size: 14px;
  font-weight: 500;
  color: var(--c-text);
  margin-bottom: 8px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.faq-q-mark {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 800;
  color: var(--c-accent);
  flex-shrink: 0;
}

.faq-a {
  font-size: 13px;
  color: var(--c-text2);
  line-height: 1.8;
  padding-left: 24px;
}

/* ==================== LIMITED ==================== */
.limited-box {
  margin-top: 28px;
  padding: 36px 28px;
  background: linear-gradient(135deg, rgba(212,255,92,0.06) 0%, rgba(212,255,92,0.02) 100%);
  border: 1px solid rgba(212,255,92,0.2);
  border-radius: var(--radius);
  text-align: center;
}

.limited-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--c-accent);
  margin-bottom: 14px;
}

.limited-slots {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 6px;
}

.slot {
  width: 22px; height: 8px;
  border-radius: 100px;
  background: rgba(212,255,92,0.2);
  border: 1px solid rgba(212,255,92,0.3);
}

.slot-label {
  font-size: 12px;
  color: var(--c-text3);
  margin-bottom: 20px;
}

.limited-desc {
  font-size: 14px;
  color: var(--c-text2);
  margin-bottom: 8px;
}

.limited-price-old {
  font-size: 15px;
  color: var(--c-text3);
  text-decoration: line-through;
  margin-bottom: 6px;
}

.limited-price-new {
  font-family: var(--font-num);
  font-size: 44px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--c-accent);
  margin-bottom: 4px;
}

.limited-price-sub {
  font-size: 13px;
  color: var(--c-text3);
  margin-bottom: 24px;
}

.limited-note {
  font-size: 12px;
  color: var(--c-text3);
  margin-top: 14px;
}

/* ==================== FINAL CTA ==================== */
.final-cta-section {
  padding: 80px 0 100px;
  border-top: 1px solid var(--c-border);
  text-align: center;
}

.final-cta-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 5vw, 40px);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 16px;

<script>
// 繝薙ョ繧ｪ繝帙ヰ繝ｼ蜀咲函
document.querySelectorAll('.vid-thumb.has-video').forEach(thumb => {
  const video = thumb.querySelector('video');
  if (!video) return;
  thumb.addEventListener('mouseenter', () => video.play());
  thumb.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
});

// 繧ｹ繧ｯ繝ｭ繝ｼ繝ｫ繧｢繝九Γ繝ｼ繧ｷ繝ｧ繝ｳ
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
